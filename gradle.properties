# Gradle build configuration for DreamJEmu.
#
# The defaults below are intentionally conservative (low memory usage, no
# persistent daemon, no parallel execution) so the project builds reliably
# on modest hardware (e.g. ~4GB RAM machines), which matters for a hobby
# project that should be easy for anyone to contribute to.
#
# If you have a more powerful machine, feel free to override these locally
# (do NOT commit personal overrides — put them in a gitignored
# gradle.properties in your Gradle user home, ~/.gradle/gradle.properties,
# instead) with something like:
#   org.gradle.jvmargs=-Xmx2048m
#   org.gradle.daemon=true
#   org.gradle.parallel=true

# Cap the JVM heap used by Gradle itself (not the toolchain JDK used to compile).
org.gradle.jvmargs=-Xmx768m

# Disable the persistent daemon: slightly slower per-build, but avoids a
# long-lived background Java process eating memory between builds.
org.gradle.daemon=false

# Disable parallel module builds: uses less peak memory at the cost of speed.
org.gradle.parallel=false
org.gradle.workers.max=1
