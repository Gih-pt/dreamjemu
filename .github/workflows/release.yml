name: Stable Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Package release app image (jpackage)
        run: ./gradlew :app-javafx:jpackageImage --no-daemon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamjemu-${{ github.ref_name }}-${{ matrix.os }}
          path: app-javafx/build/jpackage/**
          if-no-files-found: warn

  publish-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Note
        run: |
          echo "TODO: collect per-OS app-image artifacts and publish a GitHub Release for tag ${{ github.ref_name }}"
          echo "marked as a Stable build (prerelease: false)."
